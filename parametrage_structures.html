<!doctype html>
<html lang="fr">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IHM - Paramétrage des Marques</title>

    <!-- Salesforce Lightning Design System (SLDS) CSS -->
    <link rel="stylesheet" href="css/salesforce-lightning-design-system.min.css">

    <!-- Custom CSS for Local Fonts -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="img/favicon.png">

    <!-- Auth Guard - Must be first script -->
    <script src="js/auth-guard.js"></script>
</head>

<body class="slds-scope">
    <div id="layout-header"></div>

    <div class="app-container">
        <!-- Sidebar Placeholder -->
        <div id="layout-sidebar"></div>

        <!-- Main Content -->
        <main class="main-content">
            <div class="slds-p-around_medium">
                <!-- Page Header -->
                <div class="slds-page-header slds-m-bottom_medium">
                    <div class="slds-page-header__row">
                        <div class="slds-page-header__col-title">
                            <div class="slds-media">
                                <div class="slds-media__figure">
                                    <span class="slds-icon_container">
                                        🏗️
                                    </span>
                                </div>
                                <div class="slds-media__body">
                                    <div class="slds-page-header__name">
                                        <div class="slds-page-header__name-title">
                                            <h1 class="page-title">
                                                PARAMÉTRAGE DES MARQUES
                                            </h1>
                                        </div>
                                    </div>
                                    <p class="slds-page-header__name-meta page-subtitle">Gérer la configuration
                                        centralisée des marques</p>
                                </div>
                            </div>
                        </div>
                        <div class="slds-page-header__col-actions">
                            <button id="help-icon-btn" class="help-btn" title="Aide">❓</button>
                        </div>
                    </div>
                </div>

                <div class="slds-grid slds-gutters slds-wrap">
                    <!-- Selection Card -->
                    <div class="slds-col slds-size_1-of-1 slds-m-bottom_medium">
                        <article class="slds-card">
                            <div class="slds-card__header slds-grid">
                                <header class="slds-media slds-media_center slds-has-flexi-truncate">
                                    <div class="slds-media__body">
                                        <h2 class="slds-card__header-title">
                                            <span class="slds-text-heading_small">Gérer les Marques</span>
                                        </h2>
                                    </div>
                                </header>
                                <div class="slds-no-flex">
                                    <button id="new-structure-btn" class="slds-button slds-button_brand"
                                        title="Créer une nouvelle structure">
                                        <span class="slds-m-right_xx-small">➕</span> Nouveau Domaine / Sous-domaine /
                                        Marque
                                    </button>
                                </div>
                            </div>
                            <div class="slds-card__body slds-card__body_inner">
                                <div class="slds-grid slds-gutters slds-wrap">
                                    <!-- Marque Filter -->
                                    <div
                                        class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-m-bottom_x-small">
                                        <div class="slds-form-element">
                                            <label class="slds-form-element__label" for="marque-select">Marque</label>
                                            <div class="slds-form-element__control">
                                                <div class="slds-select_container">
                                                    <select class="slds-select" id="marque-select">
                                                        <option value="">Chargement...</option>
                                                    </select>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <!-- Domaine Filter -->
                                    <div id="domaine-filter-container"
                                        class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-m-bottom_x-small slds-hide">
                                        <div class="slds-form-element">
                                            <label class="slds-form-element__label" for="domaine-select">Domaine</label>
                                            <div class="slds-form-element__control">
                                                <div class="slds-select_container">
                                                    <select class="slds-select" id="domaine-select">
                                                        <option value="">Sélectionner un domaine...</option>
                                                    </select>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <!-- Sous-domaine Filter -->
                                    <div id="sous-domaine-filter-container"
                                        class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-m-bottom_x-small slds-hide">
                                        <div class="slds-form-element">
                                            <label class="slds-form-element__label"
                                                for="sous-domaine-select">Sous-domaine</label>
                                            <div class="slds-form-element__control">
                                                <div class="slds-select_container">
                                                    <select class="slds-select" id="sous-domaine-select">
                                                        <option value="">Sélectionner un sous-domaine...</option>
                                                    </select>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </article>
                    </div>

                    <!-- Structure Details Card -->
                    <div id="structure-details-container"
                        class="slds-col slds-size_1-of-1 slds-m-bottom_medium slds-hide">
                        <article class="slds-card">
                            <div class="slds-card__header slds-grid">
                                <header class="slds-media slds-media_center slds-has-flexi-truncate">
                                    <div class="slds-media__body">
                                        <h2 class="slds-card__header-title">
                                            <span class="slds-text-heading_small">Détails de la Marque : <span
                                                    id="detail-structure-name"></span></span>
                                        </h2>
                                    </div>
                                </header>
                            </div>
                            <div class="slds-card__body slds-card__body_inner">
                                <div id="structure-details-content" class="slds-grid slds-wrap slds-gutters_small">
                                    <!-- Details populated by JS -->
                                </div>
                            </div>
                        </article>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Scripts -->
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1550.0.min.js"></script>
    <script src="js/aws-config.js"></script>
    <script src="news/news.js"></script>
    <script src="js/layout.js"></script>
    <script src="js/script.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/dynamodb-service.js"></script>
    <script src="js/structure-manager.js"></script>

    <!-- Editor Modal -->
    <section id="structure-editor-modal" role="dialog" tabindex="-1" aria-modal="true"
        class="slds-modal slds-modal_large">
        <div class="slds-modal__container">
            <header class="slds-modal__header">
                <button id="close-editor-btn"
                    class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Fermer">
                    ❌
                </button>
                <h2 class="slds-modal__title slds-hyphenate">
                    <span id="editor-title">Nouveau Domaine / Sous-domaine / Marque</span>
                </h2>
            </header>
            <div class="slds-modal__content slds-p-around_medium">
                <div class="slds-grid slds-wrap slds-gutters_small">
                    <!-- Structure (PK) -->
                    <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                        <div class="slds-form-element">
                            <label class="slds-form-element__label" for="editor-structure">
                                <abbr class="slds-required" title="required">*</abbr> Marque / Domaine / Sous-domaine
                            </label>
                            <div class="slds-form-element__control">
                                <input type="text" id="editor-structure" class="slds-input" placeholder="ex: MARQUE_NOM"
                                    required>
                            </div>
                        </div>
                    </div>

                    <!-- Type -->
                    <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                        <div class="slds-form-element">
                            <label class="slds-form-element__label" for="editor-type">Type</label>
                            <div class="slds-form-element__control">
                                <div class="slds-select_container">
                                    <select id="editor-type" class="slds-select">
                                        <option value="marque">Marque</option>
                                        <option value="domaine">Domaine</option>
                                        <option value="sous-domaine">Sous-domaine</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>


                    <!-- MoteurDecision -->
                    <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                        <div class="slds-form-element">
                            <label class="slds-form-element__label" for="editor-moteur">Moteur de Décision</label>
                            <div class="slds-form-element__control">
                                <div class="slds-select_container">
                                    <select id="editor-moteur" class="slds-select">
                                        <option value="CoreDecision">CoreDecision</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Parent -->
                    <div class="slds-col slds-size_1-of-2 slds-m-bottom_small">
                        <div class="slds-form-element">
                            <label class="slds-form-element__label" for="editor-parent">Parent</label>
                            <div class="slds-form-element__control">
                                <div class="slds-select_container">
                                    <select id="editor-parent" class="slds-select">
                                        <option value="">Aucun</option>
                                        <!-- Populate dynamically -->
                                    </select>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
            <footer class="slds-modal__footer">
                <button id="cancel-editor-btn" class="slds-button slds-button_neutral">Annuler</button>
                <button id="save-structure-btn" class="slds-button slds-button_brand">Sauvegarder</button>
            </footer>
        </div>
    </section>
    <div id="editor-backdrop" class="slds-backdrop"></div>

    <!-- Confirmation Modal -->
    <section id="confirmation-modal" role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-modal_small">
        <div class="slds-modal__container">
            <header class="slds-modal__header slds-theme_error slds-theme_alert-texture">
                <button id="close-confirm-btn"
                    class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Fermer">
                    ❌
                </button>
                <h2 class="slds-modal__title slds-hyphenate" id="confirm-modal-title">Confirmation</h2>
            </header>
            <div class="slds-modal__content slds-p-around_medium" id="confirm-modal-content">
                <p id="confirm-modal-message">Êtes-vous sûr ?</p>
            </div>
            <footer class="slds-modal__footer">
                <button id="cancel-confirm-btn" class="slds-button slds-button_neutral">Annuler</button>
                <button id="ok-confirm-btn" class="slds-button slds-button_destructive">Confirmer</button>
            </footer>
        </div>
    </section>
    <div id="confirmation-backdrop" class="slds-backdrop"></div>
</body>

</html>
